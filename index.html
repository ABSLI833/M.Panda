<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monalisha Panda</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#f5f7fb;
}

/* HEADER */
nav{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 5%;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
border-bottom:2px solid #ffd700;
}
.logo-box{display:flex;align-items:center;gap:10px;}
.logo-box img{height:40px;}
.logo-box h2{font-family:'Playfair Display';color:#2b2f77;}
.menu{display:flex;gap:25px;}
.menu a{text-decoration:none;color:#333;}
.book-btn{background:#ffd700;padding:8px 15px;border-radius:20px;}

/* HERO */
.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:100px 5%;
background:linear-gradient(135deg,#2b2f77,#6a1b9a);
color:white;
}
.hero-text{max-width:500px;}
.hero h1{font-size:42px;}
.hero-buttons a{
padding:12px 20px;
border-radius:25px;
margin-right:10px;
text-decoration:none;
}
.btn1{background:#ffd700;color:#000;}
.btn2{background:#25D366;color:white;}
.hero img{width:350px;border-radius:20px;}

/* ABOUT */
.about{
padding:80px 5%;
text-align:center;
background:#fff;
}
.about-cards{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.about-card{
width:250px;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
border-radius:15px;
overflow:hidden;
}
.card-top{padding:30px;font-size:35px;}
.card1{background:#2b2f77;color:white;}
.card2{background:#6a1b9a;color:white;}
.card3{background:#ffd700;}
.card-bottom{padding:20px;}

/* SERVICES */
.services{
padding:80px 5%;
text-align:center;
background:#f9fafc;
}
.services-cards{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}
.service-card{
width:250px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.service-card button{
margin-top:10px;
padding:8px 15px;
border:none;
background:#2b2f77;
color:white;
border-radius:20px;
cursor:pointer;
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}
.popup-content{
background:white;
padding:20px;
border-radius:10px;
width:300px;
text-align:center;
}
.popup-content input{
width:100%;
padding:10px;
margin:5px 0;
}
</style>
</head>

<body>

<!-- HEADER -->
<nav>
<div class="logo-box">
<img src="logo.png">
<h2>Monalisha Panda</h2>
</div>
<div class="menu">
<a href="#">Services</a>
<a href="#">About</a>
<a href="#" class="book-btn">Book Now</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div class="hero-text">
<h1>Secure Your Future with Smart Financial Planning</h1>
<div class="hero-buttons">
<a href="#" class="btn1">Book Appointment</a>
<a href="#" class="btn2">WhatsApp</a>
</div>
</div>
<img src="mphoto.png">
</section>

<!-- ABOUT -->
<section class="about">
<h2>Know Your Advisor</h2>
<div class="about-cards">
<div class="about-card">
<div class="card-top card1">📈</div>
<div class="card-bottom">2+ Years Experience</div>
</div>
<div class="about-card">
<div class="card-top card2">🏆</div>
<div class="card-bottom">MRA Advisor</div>
</div>
<div class="about-card">
<div class="card-top card3">🤝</div>
<div class="card-bottom">Trusted by Clients</div>
</div>
</div>
</section>

<!-- SERVICES -->
<section class="services">
<h2>Our Services</h2>

<div class="services-cards">

<div class="service-card">
📈
<h3>Retirement Planning</h3>
<button onclick="openForm('Retirement')">Plan My Retirement</button>
</div>

<div class="service-card">
🎓
<h3>Child Education</h3>
<button onclick="openForm('Child')">Plan Child Future</button>
</div>

</div>
</section>

<!-- POPUP -->
<div id="popupForm" class="popup">
<div class="popup-content">
<h3>Get Your Plan</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="WhatsApp">
<input id="age" placeholder="Age">
<input id="income" placeholder="Income">

<div id="childFields" style="display:none;">
<input id="childName" placeholder="Child Name">
<input id="childAge" placeholder="Child Age">
</div>

<button onclick="sendWhatsApp()">Submit</button>
</div>
</div>

<script>
let service="";

function openForm(s){
service=s;
document.getElementById("popupForm").style.display="flex";

if(s==="Child"){
document.getElementById("childFields").style.display="block";
}else{
document.getElementById("childFields").style.display="none";
}
}

function sendWhatsApp(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

let msg=`Service:${service}%0AName:${name}%0APhone:${phone}`;
window.open("https://wa.me/919337208017?text="+msg);
}
</script>

</body>
</html>
