<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monalisha Panda</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
}

/* HEADER */
nav{
position:sticky;
top:0;
z-index:1000;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 5%;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(12px);
border-bottom:2px solid #ffd700;
}

.logo-box{
display:flex;
align-items:center;
gap:12px;
}

.logo-box img{
height:40px;
}

.logo-box h2{
font-family:'Playfair Display', serif;
font-size:26px;
color:#2b2f77;
margin:0;
}

.menu{
display:flex;
gap:30px;
align-items:center;
}

.menu a{
text-decoration:none;
color:#333;
font-weight:500;
}

.book-btn{
background:linear-gradient(45deg,#ffd700,#ffcc00);
padding:10px 20px;
border-radius:25px;
font-weight:600;
color:#000;
}

/* HERO */
.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:110px 5%; /* FIXED spacing */
background:linear-gradient(135deg,#2b2f77,#6a1b9a);
color:white;
gap:40px;
}

.hero-text{
flex:1;
max-width:520px; /* FIXED width */
}

.hero h1{
font-size:46px;
line-height:1.2;
font-weight:700;
margin-bottom:20px;
}

.hero p{
margin-bottom:25px;
opacity:0.9;
}

/* BUTTONS */
.hero-buttons{
display:flex;
gap:20px; /* FIXED spacing */
margin-top:10px;
}

.btn-primary,
.btn-whatsapp{
padding:14px 28px;
border-radius:30px;
text-decoration:none;
font-weight:600;
transition:0.3s ease;
box-shadow:0 8px 20px rgba(0,0,0,0.2); /* SHADOW */
}

/* PRIMARY BUTTON */
.btn-primary{
background:#ffd700;
color:#000;
}

.btn-primary:hover{
transform:translateY(-3px);
box-shadow:0 12px 25px rgba(255,215,0,0.5);
}

/* WHATSAPP BUTTON */
.btn-whatsapp{
background:#25D366;
color:white;
}

.btn-whatsapp:hover{
transform:translateY(-3px);
box-shadow:0 12px 25px rgba(37,211,102,0.5);
}

/* IMAGE */
.hero-image{
flex:1;
text-align:right;
}

.hero-image img{
width:380px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
border:3px solid rgba(255,255,255,0.15);
}

/* MOBILE */
@media(max-width:768px){
.hero{
flex-direction:column;
text-align:center;
}

.hero-image img{
width:90%;
margin-top:20px;
}

.hero-buttons{
justify-content:center;
}
}
</style>

</head>

<body>

<!-- HEADER -->
<nav>

<div class="logo-box">
<img src="logo.png">
<h2>Monalisha Panda</h2>
</div>

<div class="menu">
<a href="#">Services</a>
<a href="#">About</a>
<a href="#" class="book-btn">Book Now</a>
</div>

</nav>

<!-- HERO -->
<section class="hero">

<div class="hero-text">
<h1>Secure Your Future with Expert Financial Planning</h1>

<p>
Trusted Financial Advisor helping you grow wealth, save taxes & secure your family with smart financial strategies.
</p>

<div class="hero-buttons">
<a href="#" class="btn-primary">Book Appointment</a>
<a href="#" class="btn-whatsapp">WhatsApp Now</a>
</div>
</div>

<div class="hero-image">
<img src="mphoto.png">
</div>

</section>

</body>
</html>
